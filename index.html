<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>송정우 | 한전KDN</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.44.0/build/stlite.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #root { width: 100%; height: 100vh; }
    /* 로딩 스피너 */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1B2A4A 0%, #0A1428 100%);
      color: #fff; font-family: 'Noto Sans KR', sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3D6FE0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .loading-sub { font-size: 0.8rem; color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <!-- 로딩 화면 -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-title">⚡ 한전KDN</div>
    <div class="loading-sub">앱을 초기화하는 중입니다…</div>
  </div>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.44.0/build/stlite.js"></script>
  <script>
    stlite.mount(
      {
        requirements: ["pandas"],
        entrypoint: "app.py",
        files: {
          "app.py": { url: "./app.py" }
        }
      },
      document.getElementById("root")
    );

    // stlite가 준비되면 로딩 화면 제거
    const loading = document.getElementById("loading");
    const observer = new MutationObserver(() => {
      const iframe = document.querySelector("#root iframe");
      if (iframe) {
        setTimeout(() => loading.classList.add("fade-out"), 800);
        setTimeout(() => loading.remove(), 1300);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById("root"), { childList: true, subtree: true });
  </script>
</body>
</html>

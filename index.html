<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>мҶЎм •мҡ° | н•ңм „KDN</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>вҡЎ</text></svg>" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.44.0/build/stlite.css" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #root { width: 100%; height: 100vh; }
    /* лЎңл”© мҠӨн”јл„Ҳ */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1B2A4A 0%, #0A1428 100%);
      color: #fff; font-family: 'Noto Sans KR', sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3D6FE0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .loading-sub { font-size: 0.8rem; color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <!-- лЎңл”© нҷ”л©ҙ -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-title">вҡЎ н•ңм „KDN</div>
    <div class="loading-sub" id="loadingMsg">Python нҷҳкІҪ лЎңл”© мӨ‘вҖҰ</div>
  </div>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.44.0/build/stlite.js"></script>
  <script>
    // лЎңл”© л©”мӢңм§Җ мҲңнҷҳ
    const msgs = ["Python нҷҳкІҪ лЎңл”© мӨ‘вҖҰ", "Streamlit мҙҲкё°нҷ” мӨ‘вҖҰ", "м•ұмқ„ мӢңмһ‘н•ҳлҠ” мӨ‘вҖҰ"];
    let msgIdx = 0;
    const msgEl = document.getElementById("loadingMsg");
    const msgTimer = setInterval(() => {
      msgIdx = (msgIdx + 1) % msgs.length;
      msgEl.textContent = msgs[msgIdx];
    }, 3000);

    stlite.mount(
      {
        requirements: [],
        entrypoint: "app.py",
        files: {
          "app.py": { url: "./app.py" }
        }
      },
      document.getElementById("root")
    );

    // stliteк°Җ мӨҖл№„лҗҳл©ҙ лЎңл”© нҷ”л©ҙ м ңкұ°
    const loading = document.getElementById("loading");
    const observer = new MutationObserver(() => {
      // stliteлҠ” iframeмқҙ м•„лӢҢ divлҘј #rootм—җ м§Ғм ‘ л ҢлҚ”л§Ғн•Ё
      const content = document.querySelector("#root > div");
      if (content) {
        clearInterval(msgTimer);
        setTimeout(() => loading.classList.add("fade-out"), 2000);
        setTimeout(() => loading.remove(), 2500);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById("root"), { childList: true });

    // м•Ҳм „л§қ: 20мҙҲ нӣ„ к°•м ң м ңкұ°
    setTimeout(() => {
      if (document.getElementById("loading")) {
        loading.classList.add("fade-out");
        setTimeout(() => loading.remove(), 500);
      }
    }, 20000);
  </script>
</body>
</html>
